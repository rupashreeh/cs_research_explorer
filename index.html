<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CS Research Concept Explorer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f3;
  --bg-tertiary: #eeece8;
  --text-primary: #1a1a18;
  --text-secondary: #6b6b66;
  --text-tertiary: #9c9c97;
  --border-light: rgba(0,0,0,0.09);
  --border-mid: rgba(0,0,0,0.16);
  --radius-md: 8px;
  --radius-lg: 12px;
  --accent: #534AB7;
  --accent-bg: #EEEDFE;
  --accent-border: #AFA9EC;
  --accent-text: #3C3489;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1c1c1a; --bg-secondary: #252523; --bg-tertiary: #2e2e2b;
    --text-primary: #f0ede8; --text-secondary: #9c9c97; --text-tertiary: #6b6b66;
    --border-light: rgba(255,255,255,0.07); --border-mid: rgba(255,255,255,0.13);
    --accent: #8b84d7; --accent-bg: #26215C; --accent-border: #534AB7; --accent-text: #AFA9EC;
  }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-tertiary); color: var(--text-primary);
  min-height: 100vh; padding: 2rem 1rem; line-height: 1.6;
}
.app { max-width: 860px; margin: 0 auto; }

.header { margin-bottom: 2rem; }
.header h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.4px; margin-bottom: 10px; }
.header p { font-size: 14px; color: var(--text-secondary); max-width: 680px; line-height: 1.75; }

.search-card {
  background: var(--bg-primary); border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem;
}
.search-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
.search-row input, .search-row select {
  font-size: 14px; padding: 9px 14px; border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-md); background: var(--bg-secondary);
  color: var(--text-primary); outline: none;
}
.search-row input { flex: 1; min-width: 200px; transition: border-color 0.15s; }
.search-row input:focus { border-color: var(--accent); }
.search-row select { cursor: pointer; min-width: 155px; }
.btn-primary {
  font-size: 14px; padding: 9px 22px; border: none;
  border-radius: var(--radius-md); background: var(--accent); color: #fff;
  cursor: pointer; font-weight: 500; transition: opacity 0.15s; white-space: nowrap;
}
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.sources-section { border-top: 0.5px solid var(--border-light); padding-top: 12px; }
.sources-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
.sources-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 8px; }
.source-card {
  border: 0.5px solid var(--border-mid); border-radius: var(--radius-md);
  padding: 10px 12px; cursor: pointer; transition: all 0.15s;
  background: var(--bg-secondary);
}
.source-card:hover { border-color: var(--accent); background: var(--bg-primary); }
.source-card.active { border-color: var(--accent); background: var(--accent-bg); }
.source-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
.source-check {
  width: 15px; height: 15px; border-radius: 3px; border: 0.5px solid var(--border-mid);
  background: var(--bg-primary); flex-shrink: 0; display: flex; align-items: center;
  justify-content: center; font-size: 10px; color: transparent; transition: all 0.15s;
}
.source-card.active .source-check { background: var(--accent); border-color: var(--accent); color: #fff; }
.source-name { font-size: 13px; font-weight: 500; }
.source-desc { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }
.source-card.active .source-desc { color: var(--accent-text); }

.tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
.tags-label { font-size: 12px; color: var(--text-secondary); }
.tag {
  font-size: 12px; padding: 5px 12px; border-radius: 999px;
  border: 0.5px solid var(--border-mid); color: var(--text-secondary);
  cursor: pointer; background: var(--bg-primary); transition: all 0.15s; user-select: none;
}
.tag:hover { background: var(--bg-secondary); color: var(--text-primary); }
.tag.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border); }

.pipeline {
  background: var(--bg-primary); border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
}
.pipeline-title {
  font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 14px;
}
.pipeline-steps { display: flex; flex-direction: column; gap: 12px; }
.pipeline-step { display: flex; align-items: center; gap: 12px; }
.step-icon {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
}
.step-icon.pending { background: var(--bg-secondary); color: var(--text-tertiary); border: 0.5px solid var(--border-mid); }
.step-icon.running { background: var(--accent-bg); color: var(--accent); border: 0.5px solid var(--accent-border); animation: breathe 1.2s infinite; }
.step-icon.done    { background: #E1F5EE; color: #085041; border: 0.5px solid #5DCAA5; }
.step-icon.error   { background: #FCEBEB; color: #791F1F; border: 0.5px solid #F09595; }
@keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.5} }
.step-label { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }
.step-label strong { color: var(--text-primary); font-weight: 500; }
.step-detail { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

.stats-bar {
  background: var(--bg-primary); border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-lg); padding: 1rem 1.5rem; margin-bottom: 1.75rem;
  display: flex; align-items: center; gap: 0; flex-wrap: wrap;
}
.stat-item { text-align: center; padding: 0 1.25rem; }
.stat-item:first-child { padding-left: 0; }
.stat-n { display: block; font-size: 26px; font-weight: 600; line-height: 1.1; }
.stat-n.agreed { color: #085041; }
.stat-label { font-size: 11px; color: var(--text-secondary); }
.stat-divider { width: 0.5px; height: 36px; background: var(--border-mid); flex-shrink: 0; }
.stat-note { font-size: 11px; color: var(--text-tertiary); width: 100%; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border-light); }

.timeline-bar {
  display: flex; margin-bottom: 1.75rem; border-radius: var(--radius-md);
  overflow: hidden; border: 0.5px solid var(--border-mid); background: var(--bg-primary);
}
.tbar-seg {
  flex: 1; padding: 10px 6px; text-align: center; font-size: 12px;
  cursor: pointer; border-right: 0.5px solid var(--border-light);
  color: var(--text-secondary); transition: background 0.15s;
}
.tbar-seg:last-child { border-right: none; }
.tbar-seg:hover { background: var(--bg-secondary); }
.tbar-seg.has-data { color: var(--text-primary); font-weight: 500; }
.tbar-seg .tbar-sub { display: block; font-size: 10px; color: var(--text-secondary); font-weight: 400; margin-top: 2px; }

.decade-section { margin-bottom: 2rem; }
.decade-label {
  font-size: 12px; font-weight: 600; color: var(--text-secondary);
  letter-spacing: 0.5px; text-transform: uppercase;
  margin-bottom: 0.75rem; padding-bottom: 8px;
  border-bottom: 0.5px solid var(--border-light);
  display: flex; align-items: center; gap: 10px;
}
.decade-badge {
  font-size: 11px; background: var(--bg-secondary); padding: 2px 8px;
  border-radius: 999px; border: 0.5px solid var(--border-light);
  color: var(--text-secondary); font-weight: 400; text-transform: none; letter-spacing: 0;
}

.paper-card {
  background: var(--bg-primary); border: 0.5px solid var(--border-light);
  border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px;
  transition: border-color 0.15s;
}
.paper-card:hover { border-color: var(--border-mid); }
.paper-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
.paper-title { font-size: 14px; font-weight: 500; line-height: 1.5; flex: 1; }
.paper-title a { color: inherit; text-decoration: underline; text-underline-offset: 2px; text-decoration-color: var(--border-mid); }
.paper-title a:hover { text-decoration-color: var(--accent); }
.paper-year { font-size: 12px; color: var(--text-secondary); font-weight: 400; margin-left: 4px; }
.paper-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.venue-pill { font-size: 11px; padding: 3px 9px; border-radius: 999px; white-space: nowrap; font-weight: 500; }
.v-pldi  { background:#E6F1FB; color:#0C447C; }
.v-popl  { background:#EEEDFE; color:#3C3489; }
.v-sosp  { background:#E1F5EE; color:#085041; }
.v-osdi  { background:#FAECE7; color:#712B13; }
.v-lics  { background:#FAEEDA; color:#633806; }
.v-cav   { background:#EAF3DE; color:#27500A; }
.v-fm    { background:#FBEAF0; color:#72243E; }
.v-stoc  { background:#FCEBEB; color:#791F1F; }
.v-icfp  { background:#E6F1FB; color:#185FA5; }
.v-tacas { background:#FAEEDA; color:#854F0B; }
.v-other { background:#f1efe8; color:#5F5E5A; }
.conf-pip {
  font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 600; white-space: nowrap;
  background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border-mid);
}
.conf-pip.high { background: #E1F5EE; color: #085041; border-color: #5DCAA5; }
.conf-pip.med  { background: #FAEEDA; color: #633806; border-color: #EF9F27; }
.paper-authors { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
.paper-authors a { color: var(--accent); font-size: 11px; margin-left: 6px; }
.paper-ss { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.ss-badge {
  font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px; white-space: nowrap;
}
.ss-badge.verified   { background: #E1F5EE; color: #085041; border: 0.5px solid #5DCAA5; }
.ss-badge.unverified { background: #FCEBEB; color: #791F1F; border: 0.5px solid #F09595; }
.ss-citations { font-size: 11px; color: var(--text-tertiary); }
.unverified-card { border-color: rgba(240,149,149,0.4); }
.unverified-card:hover { border-color: #F09595; }
.paper-insight { font-size: 13px; line-height: 1.65; }
.paper-insight em { color: var(--accent); font-style: normal; font-weight: 500; }

.video-section-label {
  font-size: 12px; font-weight: 600; color: var(--text-secondary);
  letter-spacing: 0.5px; text-transform: uppercase;
  margin: 2rem 0 0.75rem; padding-bottom: 8px;
  border-bottom: 0.5px solid var(--border-light);
  display: flex; align-items: center; gap: 10px;
}

.followup-row {
  display: flex; gap: 10px; flex-wrap: wrap;
  padding: 1.25rem 0 0.5rem; border-top: 0.5px solid var(--border-light);
}
.followup-row button {
  font-size: 13px; padding: 8px 16px; border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary);
  cursor: pointer; transition: background 0.15s;
}
.followup-row button:hover { background: var(--bg-secondary); }

.error-box {
  background: #FCEBEB; border: 0.5px solid #F09595; border-radius: var(--radius-lg);
  padding: 1rem 1.25rem; font-size: 13px; color: #791F1F; margin-bottom: 1rem;
}
.error-box strong { display: block; margin-bottom: 4px; font-weight: 600; }
hr { border: none; border-top: 0.5px solid var(--border-light); margin: 2rem 0; }

.ai-disclaimer {
  font-size: 12px; color: var(--text-tertiary); line-height: 1.6;
  padding: 10px 14px; margin-top: 12px;
  background: var(--bg-secondary); border-radius: var(--radius-md);
  border: 0.5px solid var(--border-light);
}

footer {
  margin-top: 3rem; padding-top: 1rem;
  border-top: 0.5px solid var(--border-light);
  font-size: 11px; color: var(--text-tertiary); text-align: center;
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>CS Research Concept Explorer</h1>
  </div>

  <div class="search-card">
    <div class="search-row">
      <input type="text" id="conceptInput"
        placeholder="e.g. type inference, consensus algorithms, model checking…"
        onkeydown="if(event.key==='Enter') runSearch()" />
      <select id="areaSelect">
        <option value="all">All areas</option>
        <option value="pl">Programming Languages</option>
        <option value="ds">Distributed Systems</option>
        <option value="fm">Formal Methods</option>
        <option value="auto">Automata / Theory</option>
      </select>
      <button class="btn-primary" id="searchBtn" onclick="runSearch()">Explore →</button>
    </div>
    <div class="sources-section">
      <div class="sources-label">Sources — select one or more to search in parallel:</div>
      <div class="sources-grid">
        <div class="source-card active" id="card-claude" onclick="toggleSource('claude')">
          <div class="source-card-top">
            <div class="source-check" id="check-claude">✓</div>
            <span class="source-name">Claude</span>
          </div>
          <div class="source-desc">Anthropic · via proxy</div>
        </div>
        <div class="source-card" id="card-gemini" onclick="toggleSource('gemini')">
          <div class="source-card-top">
            <div class="source-check" id="check-gemini"></div>
            <span class="source-name">Gemini</span>
          </div>
          <div class="source-desc">Google · free tier · via proxy</div>
        </div>
        <div class="source-card active" id="card-groq" onclick="toggleSource('groq')">
          <div class="source-card-top">
            <div class="source-check" id="check-groq">✓</div>
            <span class="source-name">Groq</span>
          </div>
          <div class="source-desc">Llama 3.3 · free tier · via proxy</div>
        </div>
      </div>
    </div>
  </div>

  <div class="tags" id="tagRow"><span class="tags-label">Try:</span></div>
  <div id="mainContent"></div>
  <footer>
    <p>AI-generated content · Results may contain errors · Always verify before citing · Built with Claude</p>
  </footer>

</div>
<script>
const PROXY = 'https://cs-research-proxy.rrangaiyengar.workers.dev';

const SOURCES = {
  claude: { label: 'Claude'     },
  gemini: { label: 'Gemini'     },
  groq:   { label: 'Groq/Llama' }
};

const active = { claude: true, gemini: false, groq: true };

function toggleSource(id) {
  active[id] = !active[id];
  document.getElementById('card-' + id).classList.toggle('active', active[id]);
  document.getElementById('check-' + id).textContent = active[id] ? '✓' : '';
}

const SUGGESTIONS = [
  'type inference','garbage collection','consensus algorithms','model checking',
  'linear types','distributed transactions','program verification','monads',
  'memory models','theorem proving','dependent types','Byzantine fault tolerance',
  'session types','abstract interpretation','Paxos','software transactional memory'
];

const AREA_DESCS = {
  all:  'programming languages (PLDI, POPL, ICFP, OOPSLA, ESOP), distributed systems (SOSP, OSDI, EuroSys, ASPLOS, USENIX ATC), formal methods (CAV, TACAS, FM, FMSD), and automata/theory (LICS, STOC, FOCS, CONCUR)',
  pl:   'programming languages venues: PLDI, POPL, ICFP, OOPSLA, ESOP',
  ds:   'distributed systems venues: SOSP, OSDI, EuroSys, ASPLOS, USENIX ATC',
  fm:   'formal methods venues: CAV, TACAS, FM, FMSD, ATVA',
  auto: 'automata and theory venues: LICS, STOC, FOCS, CONCUR, ICALP'
};

const VENUE_CLASSES = {
  PLDI:'v-pldi',OOPSLA:'v-pldi',ESOP:'v-popl',POPL:'v-popl',
  SOSP:'v-sosp',EUROSYS:'v-sosp',ASPLOS:'v-sosp','USENIX ATC':'v-sosp',
  OSDI:'v-osdi',LICS:'v-lics',CONCUR:'v-lics',CAV:'v-cav',
  FM:'v-fm',FMSD:'v-fm',STOC:'v-stoc',FOCS:'v-stoc',
  ICFP:'v-icfp',TACAS:'v-tacas',ATVA:'v-tacas'
};

function venueClass(v) {
  const u = (v || '').toUpperCase();
  for (const k in VENUE_CLASSES) if (u.includes(k)) return VENUE_CLASSES[k];
  return 'v-other';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMd(s) {
  return (s || '').replace(/\*\*(.*?)\*\*/g, '<em>$1</em>');
}

function normTitle(t) {
  return (t || '').toLowerCase().replace(/[^a-z0-9]/g, ' ').replace(/\s+/g, ' ').trim();
}

function renderTags() {
  const row = document.getElementById('tagRow');
  SUGGESTIONS.forEach(function(s) {
    const t = document.createElement('span');
    t.className = 'tag';
    t.textContent = s;
    t.onclick = function() {
      document.getElementById('conceptInput').value = s;
      runSearch();
    };
    row.appendChild(t);
  });
}

// ── Prompts ───────────────────────────────────────────────────────────────

function gatherPrompt(concept, area) {
  return 'You are a computer science research expert.\n\n' +
    'Find 8-12 highly influential, REAL published papers about "' + concept + '" from top A* CS venues (' + AREA_DESCS[area] + ').\n' +
    'Papers should span multiple decades. For each, write a 1-2 sentence insight about its contribution. Use **bold** for the single most important phrase.\n' +
    'Only include papers you are certain actually exist. Do not hallucinate.\n\n' +
    'For the url field: provide the most likely stable URL (ACM DL, arXiv, USENIX, IEEE). If unsure, use null.\n\n' +
    'Respond ONLY with valid JSON, no markdown fences:\n' +
    '{"papers":[{"title":"string","authors":"string","year":1985,"venue":"POPL","insight":"string","url":"https://... or null"}]}';
}

function videosPrompt(concept) {
  return 'You are a computer science education expert.\n\n' +
    'List 4-6 high-quality, REAL video tutorials, lecture series, or conference talks about "' + concept + '" freely available online.\n' +
    'Only include videos you are confident actually exist.\n\n' +
    'Respond ONLY with valid JSON, no markdown fences:\n' +
    '{"videos":[{"title":"string","speaker":"string","url":"https://...","description":"1 sentence","type":"lecture|conference talk|tutorial|course"}]}';
}

// ── API calls ─────────────────────────────────────────────────────────────

function makeMessages(prompt) {
  return [
    { role: 'system', content: 'You are a CS research expert. Respond only with valid JSON, no markdown.' },
    { role: 'user',   content: prompt }
  ];
}

function parseJSON(raw) {
  return JSON.parse(raw.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim());
}

async function callClaude(prompt, signal) {
  const resp = await fetch(PROXY, {
    method: 'POST', signal,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514', max_tokens: 3000, stream: true,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!resp.ok) {
    const e = await resp.json().catch(function() { return {}; });
    throw new Error(e.error ? e.error.message : 'Claude HTTP ' + resp.status);
  }
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    const chunk = await reader.read();
    if (chunk.done) break;
    const lines = dec.decode(chunk.value, { stream: true }).split('\n');
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      if (!line.startsWith('data: ')) continue;
      const d = line.slice(6);
      if (d === '[DONE]') continue;
      try {
        const ev = JSON.parse(d);
        if (ev.type === 'content_block_delta' && ev.delta && ev.delta.text) buf += ev.delta.text;
      } catch(e) {}
    }
  }
  return parseJSON(buf);
}

async function callOpenAICompat(endpoint, prompt, signal) {
  const resp = await fetch(endpoint, {
    method: 'POST', signal,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: makeMessages(prompt), max_tokens: 3000, temperature: 0.2 })
  });
  if (!resp.ok) {
    const e = await resp.json().catch(function() { return {}; });
    throw new Error(e.error ? e.error.message : 'HTTP ' + resp.status);
  }
  const json = await resp.json();
  const raw = (json.choices && json.choices[0] && json.choices[0].message) ? json.choices[0].message.content : '{}';
  return parseJSON(raw);
}

function callSource(id, prompt, signal) {
  if (id === 'claude') return callClaude(prompt, signal);
  if (id === 'gemini') return callOpenAICompat(PROXY + '/gemini', prompt, signal);
  if (id === 'groq')   return callOpenAICompat(PROXY + '/groq',   prompt, signal);
  throw new Error('Unknown source: ' + id);
}

// ── Merge ─────────────────────────────────────────────────────────────────

function mergeResults(settled, concept) {
  const map = new Map();
  for (let i = 0; i < settled.length; i++) {
    const src = settled[i];
    for (let j = 0; j < src.papers.length; j++) {
      const p = src.papers[j];
      const key = normTitle(p.title);
      if (!map.has(key)) {
        map.set(key, { title: p.title, authors: p.authors, year: p.year, venue: p.venue, insight: p.insight, url: p.url || null, sources: [src.label], sourceCount: 1 });
      } else {
        const ex = map.get(key);
        if (ex.sources.indexOf(src.label) === -1) {
          ex.sources.push(src.label);
          ex.sourceCount++;
          if ((p.insight || '').length > (ex.insight || '').length) ex.insight = p.insight;
          if (!ex.url && p.url) ex.url = p.url;
        }
      }
    }
  }

  const totalSources = settled.length;
  const papers = [];
  map.forEach(function(p) {
    p.confidence = (p.sourceCount === totalSources && totalSources > 1) ? 'all' : (p.sourceCount > 1 ? 'high' : 'medium');
    papers.push(p);
  });
  papers.sort(function(a, b) { return b.sourceCount - a.sourceCount || a.year - b.year; });

  return {
    concept: concept,
    sources_used: settled.map(function(s) { return s.label; }).join(' + '),
    total_candidates: settled.reduce(function(n, s) { return n + s.papers.length; }, 0),
    papers: papers
  };
}

// ── Semantic Scholar verification ─────────────────────────────────────────

async function lookupPaper(paper, signal) {
  // Search by title — SS fuzzy matches well
  const query = encodeURIComponent(paper.title);
  const url = 'https://api.semanticscholar.org/graph/v1/paper/search?query=' + query +
    '&limit=3&fields=title,authors,year,venue,externalIds,citationCount,openAccessPdf,url';
  try {
    const resp = await fetch(url, { signal: signal });
    if (!resp.ok) return null;
    const json = await resp.json();
    const results = json.data || [];
    // Find best match: same title (fuzzy) and year within 1
    for (let i = 0; i < results.length; i++) {
      const r = results[i];
      const titleMatch = normTitle(r.title) === normTitle(paper.title);
      const yearMatch  = Math.abs((r.year || 0) - (paper.year || 0)) <= 1;
      if (titleMatch && yearMatch) return r;
    }
    // Looser match: just title similarity
    if (results.length > 0 && normTitle(results[0].title) === normTitle(paper.title)) {
      return results[0];
    }
    return null;
  } catch(e) {
    return null;
  }
}

async function verifyWithSemanticScholar(papers, signal) {
  // Rate limit: SS allows ~1 req/sec without API key — batch with small delays
  const results = [];
  for (let i = 0; i < papers.length; i++) {
    if (i > 0) await new Promise(function(r) { setTimeout(r, 200); });
    const paper = papers[i];
    const ss = await lookupPaper(paper, signal);
    if (ss) {
      // Use SS data: real URL, citation count, open access PDF if available
      const ssUrl = (ss.openAccessPdf && ss.openAccessPdf.url)
        ? ss.openAccessPdf.url
        : (ss.externalIds && ss.externalIds.DOI)
          ? 'https://doi.org/' + ss.externalIds.DOI
          : 'https://www.semanticscholar.org/paper/' + (ss.paperId || '');
      results.push(Object.assign({}, paper, {
        ssVerified:    true,
        ssUrl:         ssUrl,
        ssCitations:   ss.citationCount || 0,
        ssId:          ss.paperId || null,
        // Override AI-guessed URL with verified one
        url:           ssUrl
      }));
    } else {
      results.push(Object.assign({}, paper, {
        ssVerified:  false,
        ssCitations: null,
        ssId:        null
      }));
    }
  }
  return results;
}

// ── Pipeline UI ───────────────────────────────────────────────────────────

function showPipeline(steps) {
  let rows = '';
  for (let i = 0; i < steps.length; i++) {
    const s = steps[i];
    rows += '<div class="pipeline-step">' +
      '<div class="step-icon pending" id="icon-' + s.id + '">…</div>' +
      '<div class="step-label"><strong>' + s.label + '</strong>' +
      '<div class="step-detail" id="detail-' + s.id + '">' + s.detail + '</div></div>' +
      '</div>';
  }
  document.getElementById('mainContent').innerHTML =
    '<div class="pipeline"><div class="pipeline-title">Searching sources</div>' +
    '<div class="pipeline-steps">' + rows + '</div></div>';
}

function setStep(id, state, detail) {
  const icon = document.getElementById('icon-' + id);
  const det  = document.getElementById('detail-' + id);
  if (icon) icon.className = 'step-icon ' + state;
  if (det && detail !== undefined) det.textContent = detail;
}

// ── Main ──────────────────────────────────────────────────────────────────

let currentAbort = null;

async function runSearch() {
  const concept    = document.getElementById('conceptInput').value.trim();
  const area       = document.getElementById('areaSelect').value;
  const activeSrcs = Object.keys(active).filter(function(k) { return active[k]; });

  if (!concept) { document.getElementById('conceptInput').focus(); return; }
  if (!activeSrcs.length) { alert('Select at least one source.'); return; }

  if (currentAbort) currentAbort.abort();
  currentAbort = new AbortController();
  const signal = currentAbort.signal;

  document.querySelectorAll('.tag').forEach(function(t) {
    t.classList.toggle('active', t.textContent === concept);
  });
  document.getElementById('searchBtn').disabled = true;

  const steps = activeSrcs.map(function(id) {
    return { id: id, label: SOURCES[id].label, detail: 'Searching A* venues…' };
  });
  steps.push({ id: 'videos', label: 'Videos', detail: 'Finding tutorials & talks…' });
  steps.push({ id: 'ss', label: 'Semantic Scholar', detail: 'Verifying papers…' });
  showPipeline(steps);
  activeSrcs.forEach(function(id) { setStep(id, 'running', 'Searching A* venues…'); });
  setStep('videos', 'running', 'Finding tutorials & talks…');
  setStep('ss', 'pending', 'Waiting for papers…');

  try {
    const gather = gatherPrompt(concept, area);
    const vPrompt = videosPrompt(concept);

    const paperPromises = activeSrcs.map(function(id) {
      return callSource(id, gather, signal)
        .then(function(r) {
          setStep(id, 'done', 'Found ' + (r.papers ? r.papers.length : 0) + ' papers');
          return { id: id, label: SOURCES[id].label, papers: r.papers || [] };
        })
        .catch(function(e) {
          setStep(id, 'error', e.message);
          return { id: id, label: SOURCES[id].label, papers: [] };
        });
    });

    const videoPromise = callClaude(vPrompt, signal)
      .then(function(r) {
        setStep('videos', 'done', 'Found ' + (r.videos ? r.videos.length : 0) + ' resources');
        return r.videos || [];
      })
      .catch(function() {
        setStep('videos', 'error', 'Could not load videos');
        return [];
      });

    const allSettled = await Promise.all([Promise.all(paperPromises), videoPromise]);
    const settled = allSettled[0];
    const videos  = allSettled[1];

    const withPapers = settled.filter(function(r) { return r.papers.length > 0; });
    if (!withPapers.length) throw new Error('No papers found. Check your Cloudflare Worker secrets.');

    const merged = mergeResults(withPapers, concept);

    // Semantic Scholar verification
    setStep('ss', 'running', 'Verifying ' + merged.papers.length + ' papers…');
    const verified = await verifyWithSemanticScholar(merged.papers, signal);
    const verifiedCount = verified.filter(function(p) { return p.ssVerified; }).length;
    setStep('ss', 'done', verifiedCount + ' of ' + verified.length + ' verified');
    merged.papers = verified;

    renderResults(merged, videos, concept);

  } catch(err) {
    if (err.name === 'AbortError') return;
    document.getElementById('mainContent').innerHTML =
      '<div class="error-box"><strong>Error</strong>' + esc(err.message) + '</div>';
  } finally {
    document.getElementById('searchBtn').disabled = false;
  }
}

// ── Render ────────────────────────────────────────────────────────────────

function renderResults(data, videos, concept) {
  const papers      = data.papers || [];
  const multiSource = data.sources_used.indexOf('+') !== -1;
  const totalSrcs   = data.sources_used.split('+').length;

  const byDecade = {};
  for (let i = 0; i < papers.length; i++) {
    const p = papers[i];
    const d = Math.floor(p.year / 10) * 10;
    if (!byDecade[d]) byDecade[d] = [];
    byDecade[d].push(p);
  }
  const decades = Object.keys(byDecade).sort(function(a,b) { return a - b; });

  let html = '';

  // Timeline bar
  html += '<div class="timeline-bar">';
  for (let i = 0; i < decades.length; i++) {
    const d = decades[i];
    const n = byDecade[d].length;
    html += '<div class="tbar-seg has-data" onclick="scrollToId(\'dec-' + d + '\')">' + d + 's<span class="tbar-sub">' + n + ' paper' + (n > 1 ? 's' : '') + '</span></div>';
  }
  html += '</div>';

  // Papers by decade
  for (let i = 0; i < decades.length; i++) {
    const d  = decades[i];
    const ps = byDecade[d];
    html += '<div class="decade-section" id="dec-' + d + '">' +
      '<div class="decade-label">' + d + 's <span class="decade-badge">' + ps.length + ' paper' + (ps.length > 1 ? 's' : '') + '</span></div>';

    for (let j = 0; j < ps.length; j++) {
      const p  = ps[j];
      const vc = venueClass(p.venue);
      const confClass = p.sourceCount > 1 ? 'high' : 'med';
      const confLabel = multiSource ? (p.sourceCount + ' of ' + totalSrcs + ' sources') : (p.sources ? p.sources[0] : '');
      const titleHtml = p.url
        ? '<a href="' + esc(p.url) + '" target="_blank" rel="noopener">' + esc(p.title) + '</a>'
        : esc(p.title);
      const linkHtml = p.url
        ? ' <a href="' + esc(p.url) + '" target="_blank" rel="noopener" class="paper-link">↗ link</a>'
        : '';
      const ssHtml = p.ssVerified
        ? '<span class="ss-badge verified" title="Found on Semantic Scholar">✓ verified</span>' +
          (p.ssCitations !== null ? '<span class="ss-citations">' + p.ssCitations.toLocaleString() + ' citations</span>' : '')
        : '<span class="ss-badge unverified" title="Not found on Semantic Scholar — may be hallucinated">⚠ unverified</span>';

      html += '<div class="paper-card' + (p.ssVerified ? '' : ' unverified-card') + '">' +
        '<div class="paper-top">' +
        '<div class="paper-title">' + titleHtml + '<span class="paper-year">(' + p.year + ')</span></div>' +
        '<div class="paper-right">' +
        '<span class="conf-pip ' + confClass + '">' + confLabel + '</span>' +
        '<span class="venue-pill ' + vc + '">' + esc(p.venue) + '</span>' +
        '</div></div>' +
        '<div class="paper-authors">' + esc(p.authors || '') + linkHtml + '</div>' +
        '<div class="paper-ss">' + ssHtml + '</div>' +
        '<div class="paper-insight">' + renderMd(p.insight) + '</div>' +
        '</div>';
    }
    html += '</div>';
  }

  // Videos section
  if (videos && videos.length > 0) {
    const typeColors = { 'lecture': 'v-popl', 'conference talk': 'v-sosp', 'tutorial': 'v-cav', 'course': 'v-icfp' };
    html += '<div class="video-section-label">Video tutorials &amp; talks <span class="decade-badge">' + videos.length + '</span></div>';
    for (let i = 0; i < videos.length; i++) {
      const v  = videos[i];
      const tc = typeColors[v.type] || 'v-other';
      const titleHtml = v.url
        ? '<a href="' + esc(v.url) + '" target="_blank" rel="noopener">' + esc(v.title) + '</a>'
        : esc(v.title);
      const watchHtml = v.url
        ? ' <a href="' + esc(v.url) + '" target="_blank" rel="noopener" class="paper-link">↗ watch</a>'
        : '';
      html += '<div class="paper-card">' +
        '<div class="paper-top">' +
        '<div class="paper-title">' + titleHtml + '</div>' +
        '<div class="paper-right"><span class="venue-pill ' + tc + '">' + esc(v.type || 'video') + '</span></div>' +
        '</div>' +
        '<div class="paper-authors">' + esc(v.speaker || '') + watchHtml + '</div>' +
        '<div class="paper-insight">' + esc(v.description || '') + '</div>' +
        '</div>';
    }
  }

  html += '<hr><div class="followup-row">' +
    '<button onclick="askMore(\'What are the open research problems in ' + concept + ' today?\')">Open problems →</button>' +
    '<button onclick="askMore(\'Recommend a reading order to understand ' + concept + ' deeply\')">Reading order →</button>' +
    '</div>' +
    '<p class="ai-disclaimer">⚠ Results are AI-generated by Claude, Gemini, and Groq. Paper titles, authors, and links may contain errors — always verify against the original source before citing.</p>';

  document.getElementById('mainContent').innerHTML = html;
}

function scrollToId(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function askMore(q) {
  document.getElementById('conceptInput').value = q;
  document.getElementById('conceptInput').focus();
}

renderTags();
</script>
